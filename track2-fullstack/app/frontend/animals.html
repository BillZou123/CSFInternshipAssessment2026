<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animals — FarmTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>FarmTracker</h1>
    <nav>
      <a href="index.html">Paddocks</a>
      <a href="animals.html" class="active">Animals</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h2>Animals</h2>
    </div>
    <div class="page-tools">
      <form id="filters-form" class="filters-form">
        <label>
          Search
          <input type="search" id="search-input" name="search" placeholder="Tag, name, or breed">
        </label>
        <label>
          Paddock
          <select id="paddock-filter" name="paddock_id">
            <option value="">All paddocks</option>
          </select>
        </label>
        <button type="submit">Apply</button>
        <button type="button" id="clear-filters">Clear</button>
      </form>
    </div>
    <table>
      <thead>
        <tr>
          <th>Tag</th>
          <th>Name</th>
          <th>Breed</th>
          <th>Paddock</th>
          <th>Latest Health Event</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="animals-body">
        <tr><td colspan="6" class="loading">Loading…</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" onclick="changePage(1)">Next</button>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    let currentPage = 0;
    const LIMIT = 5;
    const searchParams = new URLSearchParams(window.location.search);
    let currentSearch = searchParams.get('search') || '';
    let currentPaddockId = searchParams.get('paddock_id') || '';

    function formatAnimalPaddock(animal) {
      if (animal.paddock_name) {
        return animal.paddock_id
          ? `<a href="animals.html?paddock_id=${animal.paddock_id}">${animal.paddock_name}</a>`
          : animal.paddock_name;
      }

      return animal.paddock_id ?? '—';
    }

    async function loadFilters() {
      const paddocks = await api.get('/paddocks');
      const select = document.getElementById('paddock-filter');
      select.innerHTML = ['<option value="">All paddocks</option>']
        .concat(paddocks.map(p => `<option value="${p.id}">${p.name}</option>`))
        .join('');
      select.value = currentPaddockId;
      document.getElementById('search-input').value = currentSearch;
    }

    async function loadAnimals() {
      const query = new URLSearchParams({ page: currentPage, limit: LIMIT });
      if (currentSearch) query.set('search', currentSearch);
      if (currentPaddockId) query.set('paddock_id', currentPaddockId);

      const animals = await api.get(`/animals?${query.toString()}`);
      const tbody = document.getElementById('animals-body');

      if (!animals.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No animals found.</td></tr>';
        document.getElementById('next-btn').disabled = true;
        return;
      }

      tbody.innerHTML = animals.map(a => {
        const event = a.latest_health_event
          ? `${a.latest_health_event.event_type} (${a.latest_health_event.date})`
          : '—';
        return `
          <tr>
            <td>${a.tag_number}</td>
            <td>${a.name}</td>
            <td>${a.breed ?? '—'}</td>
            <td>${formatAnimalPaddock(a)}</td>
            <td>${event}</td>
            <td><a href="animal-detail.html?id=${a.id}">View</a></td>
          </tr>
        `;
      }).join('');

      document.getElementById('page-info').textContent = `Page ${currentPage + 1}`;
      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = animals.length < LIMIT;
    }

    function changePage(dir) {
      currentPage = Math.max(0, currentPage + dir);
      loadAnimals();
    }

    document.getElementById('filters-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      currentPage = 0;
      currentSearch = document.getElementById('search-input').value.trim();
      currentPaddockId = document.getElementById('paddock-filter').value;
      await loadAnimals();
    });

    document.getElementById('clear-filters').addEventListener('click', async () => {
      currentPage = 0;
      currentSearch = '';
      currentPaddockId = '';
      document.getElementById('search-input').value = '';
      document.getElementById('paddock-filter').value = '';
      await loadAnimals();
    });

    Promise.all([loadFilters(), loadAnimals()]).catch(error => {
      document.getElementById('animals-body').innerHTML = `<tr><td colspan="6" class="error-banner">${error.message}</td></tr>`;
    });
  </script>
</body>
</html>
